<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OptiCrop AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>🌱 OptiCrop AI</h1>

        <h2>Create Your Account</h2>

        <form method="POST">

            <input
                type="text"
                name="full_name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm Password"
                required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have an account?

            <a href="{{ url_for('login') }}">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
